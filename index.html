<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXIS Design Gallery</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const INDUSTRY_CLS = {
      '공공·금융':  'badge-ind-public',
      '제조·유통':  'badge-ind-mfg',
      '의료·제약':  'badge-ind-med',
      '서비스·기타': 'badge-ind-svc',
    };
    const SCREEN_CLS = {
      'EPA':       'badge-scr-epa',
      'Dashboard': 'badge-scr-dash',
      'UI/UX':     'badge-scr-uiux',
      'Reporting': 'badge-scr-report',
      'BI/OLAP':   'badge-scr-bi',
    };

    function BxdiMainPagePrototype() {
      const [familySiteOpen, setFamilySiteOpen] = React.useState(false);
      const [activeResourceTab, setActiveResourceTab] = React.useState('Color');
      const galleryItems = [
        { id: 1, title: '은행 경영성과 종합보고서 P&L',  industry: '공공·금융',  screenType: 'Reporting', image: 'images/templates/template-1.png' },
        { id: 2, title: '개발 단계별 프로세스',           industry: '제조·유통',  screenType: 'EPA',       image: 'images/templates/template-2.png' },
        { id: 3, title: 'LAWA Scanning Overview',         industry: '서비스·기타', screenType: 'Dashboard', image: 'images/templates/template-3.png' },
        { id: 4, title: 'G-RSM 업무현황',                industry: '제조·유통',  screenType: 'Dashboard', image: 'images/templates/template-4.png' },
        { id: 5, title: '전사 운송 실적 현황',            industry: '제조·유통',  screenType: 'Dashboard', image: 'images/templates/template-5.png' },
        { id: 6, title: 'Team Performance per Shift',     industry: '서비스·기타', screenType: 'Dashboard', image: 'images/templates/template-6.png' },
        { id: 7, title: '전사 대시보드 - 고객',           industry: '제조·유통',  screenType: 'Dashboard', image: 'images/templates/template-7.png' },
        { id: 8, title: 'KESS 교육통계서비스',            industry: '공공·금융',  screenType: 'Dashboard', image: 'images/templates/template-8.png' },
      ];

      return (
        <div className="min-h-screen bg-[#050814] text-white">
          {/* Header */}
          <header className="gnb-header sticky top-0 z-50 border-b border-white/10">
            <div className="gnb-grid mx-auto grid max-w-7xl items-center px-8 h-full">
              {/* Logo */}
              <div className="flex items-center gap-2 text-xl font-bold tracking-tight">
                <img
                  src="images/axis-logo.png"
                  alt="AXIS Logo"
                  className="gnb-logo"
                />
              </div>

              {/* GNB */}
              <nav className="hidden gap-10 font-medium text-white/80 md:flex h-full items-stretch">
                <a href="#" className="gnb-link transition hover:text-white">AXIS 소개</a>
                <a href="gallery.html" className="gnb-link transition hover:text-white">레퍼런스 갤러리</a>
                <a href="resources.html" className="gnb-link transition hover:text-white">디자인 리소스</a>
              </nav>

              {/* Utility */}
              <div className="flex items-center gap-2 justify-self-end">
                {/* Search */}
                <div className="flex items-center gap-2 rounded-full border border-white/15 bg-white/5 px-4 py-2 w-52 focus-within:border-white/30 transition">
                  <svg width="15" height="15" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="9" cy="9" r="6.5" stroke="rgba(255,255,255,0.4)" strokeWidth="1.8"/>
                    <path d="M14 14L18 18" stroke="rgba(255,255,255,0.4)" strokeWidth="1.8" strokeLinecap="round"/>
                  </svg>
                  <input
                    placeholder="검색"
                    className="bg-transparent text-sm outline-none placeholder:text-white/35 text-white w-full"
                  />
                </div>
                {/* Dark mode */}
                <button className="w-9 h-9 flex items-center justify-center rounded-full border border-white/15 bg-white/5 hover:bg-white/10 transition">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" stroke="rgba(255,255,255,0.75)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
                {/* Language */}
                <button className="flex items-center gap-1.5 h-9 px-3 rounded-full border border-white/15 bg-white/5 hover:bg-white/10 transition text-sm text-white/75 font-medium">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8"/>
                    <path d="M12 3C12 3 9 7 9 12C9 17 12 21 12 21" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8" strokeLinecap="round"/>
                    <path d="M12 3C12 3 15 7 15 12C15 17 12 21 12 21" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8" strokeLinecap="round"/>
                    <path d="M3 12H21" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8" strokeLinecap="round"/>
                  </svg>
                  KR
                  <svg width="10" height="10" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 4.5L6 7.5L9 4.5" stroke="rgba(255,255,255,0.6)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          </header>

          {/* Hero Section */}
          <section className="hero-section relative overflow-hidden flex items-center justify-center">
            <canvas id="hero-canvas" className="hero-canvas" />

            <div className="hero-content relative flex flex-col items-center gap-8 text-center">
              <div className="flex flex-col items-center gap-3">
                <h1 className="hero-title">
                  A<span className="hero-title-xdi">XIS</span>
                </h1>
                <p className="hero-subtitle-1">
                  Your Innovation, Designed to Win.
                </p>
                <p className="hero-subtitle-2">
                  <span className="gradient-text"> </span>고객의 혁신을 디자인으로 완성하다.
                </p>
              </div>
              <div className="flex justify-center gap-4">
                <button className="rounded-2xl bg-white px-6 py-3 font-medium text-black shadow-lg transition hover:scale-[1.02]">
                  AXIS 자세히 알아보기
                </button>
                <a href="gallery.html" className="rounded-2xl border border-white/15 bg-white/5 px-6 py-3 font-medium text-white transition hover:bg-white/10">
                  디자인 레퍼런스 보기
                </a>
              </div>
            </div>
          </section>

          {/* Gallery Teaser */}
          <section className="mx-auto max-w-7xl px-8 py-20">
            <div className="mb-6 flex items-end justify-between">
              <div>
                <p className="text-sm text-blue-300">Reference Gallery</p>
                <h2 className="mt-2 text-3xl font-bold">레퍼런스 갤러리</h2>
              </div>
              <a href="gallery.html" className="rounded-xl border border-white/10 bg-white/5 px-5 py-3 text-sm hover:bg-white/10">
                전체보기 →
              </a>
            </div>

            <div className="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
              {galleryItems.map((item) => (
                <div key={item.id} className="gallery-card">
                  <div className="gallery-card-thumb">
                    <img
                      src={item.image}
                      alt={item.title}
                      onError={(e) => { e.currentTarget.style.display = 'none'; }}
                    />
                  </div>
                  <div className="p-5">
                    <div style={{display:'flex', gap:'6px', marginBottom:'8px', flexWrap:'wrap'}}>
                      <span className={`gallery-badge ${INDUSTRY_CLS[item.industry] || ''}`}>{item.industry}</span>
                      <span className={`gallery-badge ${SCREEN_CLS[item.screenType] || ''}`}>{item.screenType}</span>
                    </div>
                    <h3 className="text-base font-semibold leading-snug">{item.title}</h3>
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* Resources Highlight */}
          <section className="mx-auto max-w-7xl px-8 py-20">
            {/* Section Header */}
            <div className="mb-8 flex items-end justify-between">
              <div>
                <p className="page-header-label">Resources</p>
                <h2 className="mt-2 text-3xl font-bold text-white">디자인 리소스</h2>
                <p style={{marginTop:'8px', fontSize:'14px', color:'rgba(255,255,255,0.4)'}}>색상 · 차트 · 폰트 · 아이콘 실무 가이드</p>
              </div>
              <a href="resources.html"
                className="rounded-xl border border-white/10 bg-white/5 px-5 py-3 text-sm hover:bg-white/10 transition"
                style={{color:'rgba(255,255,255,0.65)', textDecoration:'none'}}>
                전체 리소스 보기 →
              </a>
            </div>

            {/* Tab Navigation */}
            <div style={{display:'flex', borderBottom:'1px solid rgba(255,255,255,0.08)', marginBottom:'28px'}}>
              {['Color','Chart','Font','Icon'].map(tab => (
                <button key={tab} onClick={() => setActiveResourceTab(tab)} style={{
                  padding:'12px 28px', fontSize:'15px', fontWeight:'500',
                  fontFamily:'Pretendard, sans-serif',
                  color: activeResourceTab===tab ? '#fff' : 'rgba(255,255,255,0.4)',
                  background:'transparent', border:'none',
                  borderBottom:`2px solid ${activeResourceTab===tab ? '#7D60FF' : 'transparent'}`,
                  marginBottom:'-1px', cursor:'pointer',
                  transition:'color 0.2s, border-color 0.2s',
                }}>{tab}</button>
              ))}
            </div>

            {/* ── Color Tab ─────────────────────────── */}
            {activeResourceTab === 'Color' && (() => {
              const themes = [
                { name:'AXIS Core',     theme:'cool', cat:'디자인',      colors:['#7D60FF','#2B67FF','#63E4B9'] },
                { name:'산림조합중앙회',  theme:'cool', cat:'엔터프라이즈', colors:['#2D6A27','#8B5E15','#6AAF5B'] },
                { name:'Toss',          theme:'cool', cat:'핀테크',       colors:['#0064FF','#1A1C5E','#70B8FF'] },
                { name:'GitHub',        theme:'cool', cat:'개발자도구',    colors:['#6E40C9','#24292F','#F778BA'] },
                { name:'한화건설',       theme:'warm', cat:'엔터프라이즈', colors:['#E8401C','#1A2744','#FF7A56'] },
                { name:'Adobe',         theme:'warm', cat:'디자인',       colors:['#FF0000','#1C1C1C','#FF6B00'] },
                { name:'카카오뱅크',     theme:'warm', cat:'핀테크',       colors:['#FFCD00','#3C2000','#FFB800'] },
                { name:'AWS',           theme:'warm', cat:'인프라',        colors:['#FF9900','#232F3E','#FFB84D'] },
              ];
              return (
                <div>
                  <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'14px'}}>
                    {themes.map((t, i) => (
                      <a key={i} href="resources.html" style={{textDecoration:'none', display:'block', borderRadius:'14px', border:'1px solid rgba(255,255,255,0.08)', background:'rgba(255,255,255,0.03)', overflow:'hidden', transition:'transform 0.15s, border-color 0.15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.borderColor='rgba(255,255,255,0.18)';}}
                        onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.borderColor='rgba(255,255,255,0.08)';}}>
                        <div style={{height:'58px', display:'flex'}}>
                          {t.colors.map((c,j) => <div key={j} style={{flex:1, background:c}}/>)}
                        </div>
                        <div style={{padding:'10px 12px'}}>
                          <div style={{display:'flex', gap:'5px', marginBottom:'6px', flexWrap:'wrap'}}>
                            <span style={{fontSize:'9px', fontWeight:'700', letterSpacing:'0.08em', textTransform:'uppercase', padding:'2px 6px', borderRadius:'4px', background:t.theme==='cool'?'rgba(43,103,255,0.18)':'rgba(232,100,28,0.18)', color:t.theme==='cool'?'#7AADFF':'#FFAA7A'}}>{t.theme==='cool'?'Cool':'Warm'}</span>
                            <span style={{fontSize:'9px', fontWeight:'600', padding:'2px 6px', borderRadius:'4px', background:'rgba(255,255,255,0.07)', color:'rgba(255,255,255,0.45)'}}>{t.cat}</span>
                          </div>
                          <div style={{fontSize:'12px', fontWeight:'600', color:'rgba(255,255,255,0.85)', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis'}}>{t.name}</div>
                        </div>
                      </a>
                    ))}
                  </div>
                  <p style={{marginTop:'10px', fontSize:'12px', color:'rgba(255,255,255,0.3)', textAlign:'right'}}>총 12개 테마 · <a href="resources.html" style={{color:'rgba(99,228,185,0.6)', textDecoration:'none'}}>전체보기 →</a></p>
                </div>
              );
            })()}

            {/* ── Chart Tab ─────────────────────────── */}
            {activeResourceTab === 'Chart' && (() => {
              const P='#7D60FF', S='#2B67FF', A='#63E4B9';
              const miniChart = (id) => {
                const vb = {viewBox:'0 0 200 100', width:'100%', style:{display:'block', height:'84px'}};
                const ax = 'rgba(255,255,255,0.15)';
                if (id===1) return (
                  <svg {...vb}>
                    <line x1="8" y1="92" x2="192" y2="92" stroke={ax} strokeWidth="0.8"/>
                    {[55,38,72,28,50,40].map((h,i) => (
                      <rect key={i} x={12+i*30} y={92-h} width="22" height={h} rx="2" fill={i===2?A:P} fillOpacity={i===2?0.8:0.65}/>
                    ))}
                  </svg>
                );
                if (id===2) return (
                  <svg {...vb}>
                    <line x1="8" y1="92" x2="192" y2="92" stroke={ax} strokeWidth="0.8"/>
                    {[[28,40,18],[22,36,24],[32,38,16],[26,30,28],[30,34,16]].map((segs,i) => {
                      let y=92;
                      return <g key={i}>{[P,S,A].map((col,j)=>{const h=segs[j];y-=h;return <rect key={j} x={16+i*36} y={y} width="26" height={h} rx={j===2?2:0} fill={col} fillOpacity="0.72"/>;})}</g>;
                    })}
                  </svg>
                );
                if (id===3) return (
                  <svg {...vb}>
                    <line x1="8" y1="92" x2="192" y2="92" stroke={ax} strokeWidth="0.8"/>
                    <polyline points="12,75 45,52 78,62 112,28 145,42 178,18 192,30" fill="none" stroke={P} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                    {[[12,75],[45,52],[78,62],[112,28],[145,42],[178,18],[192,30]].map(([x,y],i) => <circle key={i} cx={x} cy={y} r="2.8" fill={P}/>)}
                    <polyline points="12,85 45,68 78,76 112,55 145,62 178,42 192,52" fill="none" stroke={A} strokeWidth="1.5" strokeDasharray="5,3" strokeLinejoin="round" strokeLinecap="round" strokeOpacity="0.6"/>
                  </svg>
                );
                if (id===4) return (
                  <svg {...vb}>
                    <defs><linearGradient id="igag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={P} stopOpacity="0.4"/><stop offset="100%" stopColor={P} stopOpacity="0.02"/></linearGradient></defs>
                    <line x1="8" y1="92" x2="192" y2="92" stroke={ax} strokeWidth="0.8"/>
                    <polygon points="12,92 12,75 45,52 78,64 112,28 145,44 178,18 192,30 192,92" fill="url(#igag)"/>
                    <polyline points="12,75 45,52 78,64 112,28 145,44 178,18 192,30" fill="none" stroke={P} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                  </svg>
                );
                if (id===5) {
                  const arc = (cx,cy,R,r,s,e) => {
                    const rad=d=>(d-90)*Math.PI/180,c=Math.cos,sn=Math.sin;
                    const [a0,a1]=[rad(s),rad(e)],lg=e-s>180?1:0,f=n=>n.toFixed(1);
                    return `M${f(cx+R*c(a0))},${f(cy+R*sn(a0))} A${R},${R},0,${lg},1,${f(cx+R*c(a1))},${f(cy+R*sn(a1))} L${f(cx+r*c(a1))},${f(cy+r*sn(a1))} A${r},${r},0,${lg},0,${f(cx+r*c(a0))},${f(cy+r*sn(a0))} Z`;
                  };
                  return (
                    <svg {...vb}>
                      <path d={arc(90,50,42,20,  0,130)} fill={P} fillOpacity="0.82"/>
                      <path d={arc(90,50,42,20,130,220)} fill={S} fillOpacity="0.82"/>
                      <path d={arc(90,50,42,20,220,295)} fill={A} fillOpacity="0.82"/>
                      <path d={arc(90,50,42,20,295,360)} fill="rgba(255,255,255,0.18)"/>
                    </svg>
                  );
                }
                if (id===6) return (
                  <svg {...vb}>
                    <rect x="8" y="8" width="75" height="55" rx="2" fill={P} fillOpacity="0.62"/>
                    <rect x="8" y="65" width="75" height="27" rx="2" fill={P} fillOpacity="0.28"/>
                    <rect x="86" y="8" width="52" height="36" rx="2" fill={S} fillOpacity="0.62"/>
                    <rect x="86" y="46" width="52" height="46" rx="2" fill={S} fillOpacity="0.28"/>
                    <rect x="141" y="8" width="51" height="48" rx="2" fill={A} fillOpacity="0.62"/>
                    <rect x="141" y="58" width="51" height="34" rx="2" fill={A} fillOpacity="0.28"/>
                  </svg>
                );
                if (id===7) return (
                  <svg {...vb}>
                    <line x1="12" y1="8" x2="12" y2="92" stroke={ax} strokeWidth="0.8"/>
                    <line x1="12" y1="92" x2="192" y2="92" stroke={ax} strokeWidth="0.8"/>
                    <line x1="18" y1="88" x2="188" y2="15" stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="4,3"/>
                    {[[25,85,2.5,P],[45,72,3,P],[62,65,2.5,A],[80,74,3,P],[95,60,2.5,A],[112,52,3,P],[128,45,2.5,P],[145,55,2.5,A],[162,38,3,P],[178,30,2.5,P],[36,78,2,A],[105,56,2.5,P],[155,42,2.5,A],[175,22,3,P]].map(([x,y,r,col],i) => (
                      <circle key={i} cx={x} cy={y} r={r} fill={col} fillOpacity="0.72"/>
                    ))}
                  </svg>
                );
                if (id===8) return (
                  <svg {...vb}>
                    <line x1="8" y1="92" x2="192" y2="92" stroke={ax} strokeWidth="0.8"/>
                    {[8,18,36,60,70,58,36,20,10].map((h,i) => (
                      <rect key={i} x={10+i*20} y={92-h} width="20" height={h} fill={P} fillOpacity={0.35+(h/70)*0.45}/>
                    ))}
                  </svg>
                );
                return null;
              };
              const charts = [
                {id:1, name:'Bar Chart',    purpose:'비교'},
                {id:3, name:'Line Chart',   purpose:'추세'},
                {id:5, name:'Pie / Donut',  purpose:'구성비'},
                {id:6, name:'Treemap',      purpose:'구성비'},
                {id:2, name:'Stacked Bar',  purpose:'비교'},
                {id:4, name:'Area Chart',   purpose:'추세'},
                {id:7, name:'Scatter Plot', purpose:'분포'},
                {id:8, name:'Histogram',    purpose:'분포'},
              ];
              return (
                <div>
                  <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'14px'}}>
                    {charts.map((chart, i) => (
                      <a key={i} href="resources.html" style={{textDecoration:'none', display:'block', borderRadius:'14px', border:'1px solid rgba(255,255,255,0.08)', background:'rgba(255,255,255,0.03)', overflow:'hidden', transition:'transform 0.15s, border-color 0.15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.borderColor='rgba(255,255,255,0.18)';}}
                        onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.borderColor='rgba(255,255,255,0.08)';}}>
                        <div style={{background:'rgba(0,0,0,0.2)', padding:'14px 14px 8px'}}>
                          {miniChart(chart.id)}
                        </div>
                        <div style={{padding:'10px 14px'}}>
                          <span style={{fontSize:'9px', fontWeight:'700', letterSpacing:'0.08em', textTransform:'uppercase', padding:'2px 6px', borderRadius:'4px', background:'rgba(125,96,255,0.15)', color:'#b5a0ff', display:'inline-block', marginBottom:'5px'}}>{chart.purpose}</span>
                          <div style={{fontSize:'12px', fontWeight:'600', color:'rgba(255,255,255,0.85)'}}>{chart.name}</div>
                        </div>
                      </a>
                    ))}
                  </div>
                  <p style={{marginTop:'10px', fontSize:'12px', color:'rgba(255,255,255,0.3)', textAlign:'right'}}>총 8개 차트 가이드 · <a href="resources.html" style={{color:'rgba(99,228,185,0.6)', textDecoration:'none'}}>전체보기 →</a></p>
                </div>
              );
            })()}

            {/* ── Font Tab ──────────────────────────── */}
            {activeResourceTab === 'Font' && (() => {
              const specs = [
                {role:'Display', size:'56px', weight:'700', ls:'-0.03em', sample:'AXIS Design Gallery'},
                {role:'H1',      size:'40px', weight:'700', ls:'-0.02em', sample:'디자인 갤러리'},

  <script>
    (function () {
      var SIZE = 700;

      /* ── Vertex Shader: 원본 소스(r2) ── */
      var VERT = `
        attribute vec4 aVertexPosition;
        attribute vec2 aTextureCoord;
        varying vec2 vTextureCoord;
        void main() {
          gl_Position = aVertexPosition;
          vTextureCoord = aTextureCoord;
        }
      `;

      /* ── Fragment Shader: 원본 소스 "Ether" by nimitz (Uy) ── */
      var FRAG = `
        precision mediump float;
        uniform vec2 iResolution;
        uniform float iTime;
        uniform vec2 iMouse;
        uniform bool hasActiveReminders;
        uniform bool hasUpcomingReminders;
        uniform bool disableCenterDimming;
        uniform bool isFullscreen;
        varying vec2 vTextureCoord;

        #define t iTime
        mat2 m(float a){float c=cos(a), s=sin(a);return mat2(c,-s,s,c);}
        float map(vec3 p){
          p.xz*= m(t*0.4);p.xy*= m(t*0.3);
          vec3 q = p*2.+t;
          return length(p+vec3(sin(t*0.7)))*log(length(p)+1.) + sin(q.x+sin(q.z+sin(q.y)))*0.5 - 1.;
        }

        void mainImage(out vec4 fragColor, in vec2 fragCoord) {
          vec2 p = fragCoord.xy/min(iResolution.x, iResolution.y) - vec2(.9, .5);

          // 셰이더 효과 위치 조정
          p.x += -0.6;
          vec3 cl = vec3(0.);
          float d = 2.8;
          for(int i=0; i<=5; i++) {
            vec3 p3d = vec3(0,0,5.) + normalize(vec3(p, -1.))*d;
            float rz = map(p3d);
            float f = clamp((rz - map(p3d+.1))*0.5, -.1, 1.);
            vec3 baseColor = vec3(0.1, 0.3, 0.4) + vec3(5.0, 2.5, 3.0)*f;
            cl = cl*baseColor + smoothstep(2.5, .0, rz)*.7*baseColor;
            d += min(rz, 1.);
          }
          vec2 center = iResolution.xy * 0.5;
          float dist = distance(fragCoord, center);
          float radius = min(iResolution.x, iResolution.y) * 0.5;
          float centerDim = disableCenterDimming ? 1.0 : smoothstep(radius * 0.3, radius * 0.5, dist);
          fragColor = vec4(cl, 1.0);
          if (!disableCenterDimming) {
            fragColor.rgb = mix(fragColor.rgb * 0.3, fragColor.rgb, centerDim);
          }
        }

        void main() {
          vec2 fragCoord = vTextureCoord * iResolution;

          vec4 color;
          mainImage(color, fragCoord);
          gl_FragColor = color;
        }
      `;

      function compileShader(gl, type, src) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
          console.error('Shader error:', gl.getShaderInfoLog(s));
          gl.deleteShader(s);
          return null;
        }
        return s;
      }

      function startAnim(canvas) {
        canvas.width  = canvas.offsetWidth  || window.innerWidth;
        canvas.height = canvas.offsetHeight || 930;

        var gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false });
        if (!gl) { console.warn('WebGL unavailable'); return; }

        var vert = compileShader(gl, gl.VERTEX_SHADER,   VERT);
        var frag = compileShader(gl, gl.FRAGMENT_SHADER, FRAG);
        if (!vert || !frag) return;

        var prog = gl.createProgram();
        gl.attachShader(prog, vert);
        gl.attachShader(prog, frag);
        gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
          console.error('Program error:', gl.getProgramInfoLog(prog));
          return;
        }
        gl.useProgram(prog);

        /* 위치 버퍼 */
        var posBuf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
        gl.bufferData(gl.ARRAY_BUFFER,
          new Float32Array([-1,-1, 1,-1, 1,1, -1,1]), gl.STATIC_DRAW);

        /* 텍스처 좌표 버퍼 */
        var texBuf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, texBuf);
        gl.bufferData(gl.ARRAY_BUFFER,
          new Float32Array([0,0, 1,0, 1,1, 0,1]), gl.STATIC_DRAW);

        /* 인덱스 버퍼 */
        var idxBuf = gl.createBuffer();
        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
        gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,
          new Uint16Array([0,1,2, 0,2,3]), gl.STATIC_DRAW);

        var aVP  = gl.getAttribLocation(prog, 'aVertexPosition');
        var aTC  = gl.getAttribLocation(prog, 'aTextureCoord');
        var uRes = gl.getUniformLocation(prog, 'iResolution');
        var uT   = gl.getUniformLocation(prog, 'iTime');
        var uM   = gl.getUniformLocation(prog, 'iMouse');
        var uAR  = gl.getUniformLocation(prog, 'hasActiveReminders');
        var uUR  = gl.getUniformLocation(prog, 'hasUpcomingReminders');
        var uCD  = gl.getUniformLocation(prog, 'disableCenterDimming');
        var uFS  = gl.getUniformLocation(prog, 'isFullscreen');

        var W = canvas.width, H = canvas.height;
        gl.viewport(0, 0, W, H);
        gl.uniform2f(uRes, W, H);
        gl.uniform2f(uM, 0.5, 0.5);
        gl.uniform1i(uAR, 0);
        gl.uniform1i(uUR, 0);
        gl.uniform1i(uCD, 1);   /* true → 중앙 dimming 비활성화 (전체 배경) */
        gl.uniform1i(uFS, 1);   /* true → 원형 마스크 제거 */

        var t0 = Date.now();

        function draw() {
          gl.clearColor(0, 0, 0, 0);
          gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

          gl.uniform1f(uT, (Date.now() - t0) / 1000.0);

          gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
          gl.vertexAttribPointer(aVP, 2, gl.FLOAT, false, 0, 0);
          gl.enableVertexAttribArray(aVP);

          gl.bindBuffer(gl.ARRAY_BUFFER, texBuf);
          gl.vertexAttribPointer(aTC, 2, gl.FLOAT, false, 0, 0);
          gl.enableVertexAttribArray(aTC);

          gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
          gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);

          requestAnimationFrame(draw);
        }
        draw();
      }

      function tryInit() {
        var canvas = document.getElementById('hero-canvas');
        if (canvas) { startAnim(canvas); }
        else        { setTimeout(tryInit, 50); }
      }
      setTimeout(tryInit, 50);
    })();
  </script>
