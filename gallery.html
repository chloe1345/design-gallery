<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레퍼런스 갤러리 | AXIS Design Gallery</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const INDUSTRY_FILTERS = ['전체', '공공·금융', '제조·유통', '의료·제약', '서비스·기타'];
    const SCREEN_FILTERS   = ['전체', 'EPA', 'Dashboard', 'UI/UX', 'Reporting', 'BI/OLAP'];

    const TEMPLATE_META = [
      { title: '은행 경영성과 종합보고서 P&L',  industry: '공공·금융',  screenType: 'Reporting' },
      { title: '개발 단계별 프로세스',           industry: '제조·유통',  screenType: 'EPA'       },
      { title: 'LAWA Scanning Overview',         industry: '서비스·기타', screenType: 'Dashboard' },
      { title: 'G-RSM 업무현황',                industry: '제조·유통',  screenType: 'Dashboard' },
      { title: '전사 운송 실적 현황',            industry: '제조·유통',  screenType: 'Dashboard' },
      { title: 'Team Performance per Shift',     industry: '서비스·기타', screenType: 'Dashboard' },
      { title: '전사 대시보드 - 고객',           industry: '제조·유통',  screenType: 'Dashboard' },
      { title: 'KESS 교육통계서비스',            industry: '공공·금융',  screenType: 'Dashboard' },
    ];

    const RAW_DATA = Array.from({ length: 24 }, (_, i) => {
      const tplIdx = i % 8;
      const tplNum = tplIdx + 1;
      const meta = TEMPLATE_META[tplIdx];
      return {
        id: i + 1,
        title: meta.title,
        industry: meta.industry,
        screenType: meta.screenType,
        image: `images/templates/template-${tplNum}.png`,
      };
    });

    const PAGE_SIZE = 16;

    const INDUSTRY_CLS = {
      '공공·금융':  'badge-ind-public',
      '제조·유통':  'badge-ind-mfg',
      '의료·제약':  'badge-ind-med',
      '서비스·기타': 'badge-ind-svc',
    };
    const SCREEN_CLS = {
      'EPA':       'badge-scr-epa',
      'Dashboard': 'badge-scr-dash',
      'UI/UX':     'badge-scr-uiux',
      'Reporting': 'badge-scr-report',
      'BI/OLAP':   'badge-scr-bi',
    };

    function GalleryCard({ item }) {
      return (
        <div className="gallery-card">
          <div className="gallery-card-thumb">
            <img
              src={item.image}
              alt={item.title}
              onError={(e) => { e.currentTarget.style.display = 'none'; }}
            />
          </div>
          <div className="p-5">
            <div style={{display:'flex', gap:'6px', marginBottom:'8px', flexWrap:'wrap'}}>
              <span className={`gallery-badge ${INDUSTRY_CLS[item.industry] || ''}`}>{item.industry}</span>
              <span className={`gallery-badge ${SCREEN_CLS[item.screenType] || ''}`}>{item.screenType}</span>
            </div>
            <h3 className="text-base font-semibold leading-snug">{item.title}</h3>
          </div>
        </div>
      );
    }

    function FilterButton({ label, active, onClick }) {
      return (
        <button
          className={`filter-btn ${active ? 'active' : ''}`}
          onClick={onClick}
        >
          {label}
        </button>
      );
    }

    function GalleryPage() {
      const [familySiteOpen, setFamilySiteOpen] = React.useState(false);
      const [selectedIndustry, setSelectedIndustry] = React.useState('전체');
      const [selectedScreen, setSelectedScreen] = React.useState('전체');
      const [visibleCount, setVisibleCount] = React.useState(PAGE_SIZE);

      const filtered = RAW_DATA.filter(item => {
        const byIndustry = selectedIndustry === '전체' || item.industry === selectedIndustry;
        const byScreen   = selectedScreen   === '전체' || item.screenType === selectedScreen;
        return byIndustry && byScreen;
      });

      const visible = filtered.slice(0, visibleCount);
      const hasMore = visibleCount < filtered.length;

      const handleIndustry = (f) => { setSelectedIndustry(f); setVisibleCount(PAGE_SIZE); };
      const handleScreen   = (f) => { setSelectedScreen(f);   setVisibleCount(PAGE_SIZE); };

      return (
        <div className="min-h-screen bg-[#050814] text-white">

          {/* GNB */}
          <header className="gnb-header sticky top-0 z-50 border-b border-white/10">
            <div className="gnb-grid mx-auto grid max-w-7xl items-center px-8 h-full">
              <div className="flex items-center gap-2">
                <a href="index.html">
                  <img src="images/axis-logo.png" alt="AXIS Logo" className="gnb-logo" />
                </a>
              </div>

              <nav className="hidden gap-10 font-medium text-white/80 md:flex h-full items-stretch">
                <a href="index.html#about" className="gnb-link transition hover:text-white">AXIS 소개</a>
                <a href="gallery.html"       className="gnb-link active transition hover:text-white">레퍼런스 갤러리</a>
                <a href="resources.html" className="gnb-link transition hover:text-white">디자인 리소스</a>
              </nav>

              <div className="flex items-center gap-2 justify-self-end">
                <div className="flex items-center gap-2 rounded-full border border-white/15 bg-white/5 px-4 py-2 w-52 focus-within:border-white/30 transition">
                  <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
                    <circle cx="9" cy="9" r="6.5" stroke="rgba(255,255,255,0.4)" strokeWidth="1.8"/>
                    <path d="M14 14L18 18" stroke="rgba(255,255,255,0.4)" strokeWidth="1.8" strokeLinecap="round"/>
                  </svg>
                  <input placeholder="검색" className="bg-transparent text-sm outline-none placeholder:text-white/35 text-white w-full" />
                </div>
                <button className="w-9 h-9 flex items-center justify-center rounded-full border border-white/15 bg-white/5 hover:bg-white/10 transition">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" stroke="rgba(255,255,255,0.75)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
                <button className="flex items-center gap-1.5 h-9 px-3 rounded-full border border-white/15 bg-white/5 hover:bg-white/10 transition text-sm text-white/75 font-medium">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8"/>
                    <path d="M12 3C12 3 9 7 9 12C9 17 12 21 12 21" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8" strokeLinecap="round"/>
                    <path d="M12 3C12 3 15 7 15 12C15 17 12 21 12 21" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8" strokeLinecap="round"/>
                    <path d="M3 12H21" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8" strokeLinecap="round"/>
                  </svg>
                  KR
                  <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
                    <path d="M3 4.5L6 7.5L9 4.5" stroke="rgba(255,255,255,0.6)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          </header>

          {/* Page Header */}
          <div className="page-header">
            <div className="mx-auto max-w-7xl px-8">
              <p className="page-header-label">Reference Gallery</p>
              <h1 className="page-header-title">레퍼런스 갤러리</h1>
            </div>
          </div>

          {/* Content */}
          <div className="mx-auto max-w-7xl px-8 py-10 gallery-layout">

            {/* LNB */}
            <aside className="lnb">
              <nav className="lnb-section">
                <p className="lnb-section-title">산업군</p>
                {INDUSTRY_FILTERS.map(f => (
                  <FilterButton
                    key={f}
                    label={f}
                    active={selectedIndustry === f}
                    onClick={() => handleIndustry(f)}
                  />
                ))}
              </nav>

              <nav className="lnb-section">
                <p className="lnb-section-title">화면 유형</p>
                {SCREEN_FILTERS.map(f => (
                  <FilterButton
                    key={f}
                    label={f}
                    active={selectedScreen === f}
                    onClick={() => handleScreen(f)}
                  />
                ))}
              </nav>
            </aside>

            {/* Main */}
            <main className="gallery-main">
              <p className="result-count">
                총 <strong>{filtered.length}개</strong>의 레퍼런스
              </p>

              {filtered.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-32 text-white/30">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" className="mb-4">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="1.5"/>
                    <path d="M16.5 16.5L21 21" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                  </svg>
                  <p className="text-sm">해당 조건의 레퍼런스가 없습니다.</p>
                </div>
              ) : (
                <>
                  <div className="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
                    {visible.map(item => (
                      <GalleryCard key={item.id} item={item} />
                    ))}
                  </div>

                  {hasMore && (
                    <button
                      className="load-more-btn"
                      onClick={() => setVisibleCount(v => v + PAGE_SIZE)}
                    >
                      더보기 ({filtered.length - visibleCount}개 남음)
                    </button>
                  )}
                </>
              )}
            </main>
          </div>

          {/* Footer */}
          <footer className="site-footer">
            <div className="mx-auto max-w-7xl px-8 py-10">
              <div className="flex items-start justify-between gap-8">
                <div className="flex flex-col gap-6">
                  <div className="flex items-center gap-4">
                    <a href="https://www.youtube.com/@BIMATRIXKR" target="_blank" rel="noopener noreferrer"
                       className="flex items-center justify-center w-9 h-9 rounded-full border border-white/15 bg-white/5 hover:bg-white/15 transition">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M22.54 6.42A2.78 2.78 0 0 0 20.59 4.5C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29.94 29.94 0 0 0 1 12a29.94 29.94 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.5C5.12 20 12 20 12 20s6.88 0 8.59-.5a2.78 2.78 0 0 0 1.95-1.92A29.94 29.94 0 0 0 23 12a29.94 29.94 0 0 0-.46-5.58z" fill="rgba(255,255,255,0.6)"/>
                        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#0E1017"/>
                      </svg>
                    </a>
                    <a href="https://www.facebook.com/bimatrixkorea" target="_blank" rel="noopener noreferrer"
                       className="flex items-center justify-center w-9 h-9 rounded-full border border-white/15 bg-white/5 hover:bg-white/15 transition">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </a>
                    <a href="https://blog.naver.com/bi_matrix" target="_blank" rel="noopener noreferrer"
                       className="flex items-center justify-center w-9 h-9 rounded-full border border-white/15 bg-white/5 hover:bg-white/15 transition">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="3" width="18" height="18" rx="3" fill="rgba(255,255,255,0.6)"/>
                        <path d="M7 17V7l4 6V7" stroke="#0E1017" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                        <path d="M13 7v10l4-6v6" stroke="#0E1017" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </a>
                  </div>
                  <div className="flex items-center gap-6 text-sm text-white/50">
                    <a href="#" className="hover:text-white/80 transition">개인정보처리방침</a>
                    <span className="text-white/20">|</span>
                    <a href="#" className="hover:text-white/80 transition">뉴스레터 구독</a>
                    <span className="text-white/20">|</span>
                    <a href="#" className="hover:text-white/80 transition">문의하기</a>
                  </div>
                </div>

                <div className="relative flex-shrink-0">
                  <button
                    onClick={() => setFamilySiteOpen(!familySiteOpen)}
                    className="flex items-center gap-2 rounded-lg border border-white/15 bg-white/5 px-4 py-2.5 text-sm text-white/70 hover:bg-white/10 transition min-w-[160px] justify-between"
                  >
                    <span>Family Site</span>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
                         className={`family-site-chevron ${familySiteOpen ? 'open' : ''}`}>
                      <path d="M3 4.5L6 7.5L9 4.5" stroke="rgba(255,255,255,0.5)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </button>
                  {familySiteOpen && (
                    <div className="family-site-dropdown absolute right-0 bottom-full mb-1 w-48 rounded-lg border border-white/15 overflow-hidden z-10">
                      {['회사 홈페이지', 'AUD플랫폼 아카데미', '데모사이트', '고객지원사이트'].map(label => (
                        <a key={label} href="#"
                           className="block px-4 py-2.5 text-sm text-white/60 hover:bg-white/10 hover:text-white/90 transition">
                          {label}
                        </a>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>

            <div className="footer-bottom">
              <div className="mx-auto max-w-7xl px-8 py-6 flex items-end justify-between gap-8">
                <div className="flex flex-col gap-1.5 text-xs text-white/35 leading-relaxed">
                  <p className="text-white/50 font-medium text-sm">(주)비아이매트릭스</p>
                  <p>서울특별시 금천구 가산디지털1로 137 IT캐슬2차 705호 &nbsp;|&nbsp; 대표이사: 박재성</p>
                  <p>사업자등록번호: 119-86-32847 &nbsp;|&nbsp; Tel: 02-2082-3100 &nbsp;|&nbsp; Fax: 02-2082-3109</p>
                  <p className="mt-1">© 2025 BI MATRIX. All rights reserved.</p>
                </div>
                <div className="flex-shrink-0">
                  <img src="images/axis-logo.png" alt="AXIS" className="footer-logo" />
                </div>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GalleryPage />);
  </script>
</body>
</html>
