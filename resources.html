function IconSvg({ paths, size = 20 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      {paths.map((d, i) => <path key={i} d={d} />)}
    </svg>
  );
}

/* ── Color Panel ─────────────────────────────────────────── */
function ColorPanel({ showToast }) {
  const [themeFilter, setThemeFilter] = React.useState('all');
  const [clientFilter, setClientFilter] = React.useState('전체');
  const [selectedId, setSelectedId] = React.useState(null);

  const filtered = COLOR_THEMES.filter(t => {
    if (themeFilter !== 'all' && t.theme !== themeFilter) return false;
    if (clientFilter !== '전체' && t.clientCat !== clientFilter) return false;
    return true;
  });

  const selectedTheme = selectedId ? COLOR_THEMES.find(t => t.id === selectedId) : null;

  const copy = (hex) => {
    navigator.clipboard.writeText(hex).catch(() => {});
    showToast(`✓  ${hex}  복사됨`);
  };

  const handleCardClick = (id) => {
    setSelectedId(prev => prev === id ? null : id);
  };

  const handleFilterChange = (setter, val) => {
    setter(val);
    setSelectedId(null);
  };

  return (
    <div className="gallery-layout">
      <aside className="lnb">
        <nav className="lnb-section">
          <p className="lnb-section-title">Theme</p>
          {THEME_FILTERS.map(({ val, label }) => (
            <button key={val}
              className={`filter-btn ${themeFilter === val ? 'active' : ''}`}
              onClick={() => handleFilterChange(setThemeFilter, val)}>
              {label}
            </button>
          ))}
        </nav>
        <nav className="lnb-section">
          <p className="lnb-section-title">Client</p>
          {CLIENT_FILTERS.map(c => (
            <button key={c}
              className={`filter-btn ${clientFilter === c ? 'active' : ''}`}
              onClick={() => handleFilterChange(setClientFilter, c)}>
              {c}
            </button>
          ))}
        </nav>
        <div className="lnb-reference">
          <p className="lnb-ref-label">Reference</p>
          <a className="lnb-ref-link" href="https://www.supanova.dev/design-systems" target="_blank" rel="noopener noreferrer">
            <IconSvg paths={['M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6','M15 3h6v6','M10 14L21 3']} size={12} />
            supanova.dev/design-systems
          </a>
        </div>
      </aside>

      <main className="gallery-main">
        <p className="result-count">총 <strong>{filtered.length}개</strong>의 테마</p>

        <div className="theme-card-grid">
          {filtered.map(t => (
            <div key={t.id}
              className={`theme-card ${selectedId === t.id ? 'selected' : ''}`}
              onClick={() => handleCardClick(t.id)}>
              <div className="theme-card-strip">
                {t.brand.map(c => (
                  <div key={c.name} className="theme-card-strip-seg" style={{ backgroundColor: c.hex }} />
                ))}
              </div>
              <div className="theme-card-body">
                <div className="theme-card-badges">
                  <span className={`theme-badge-pill ${t.theme}`}>
                    {t.theme === 'cool' ? 'Cool' : 'Warm'}
                  </span>
                  <span className="client-cat-pill">{t.clientCat}</span>
                </div>
                <div className="theme-card-name">{t.name}</div>
              </div>
            </div>
          ))}
        </div>

        {selectedTheme && (
          <div className="theme-detail-panel">
            <div className="theme-detail-header">
              <span className="theme-detail-title">{selectedTheme.name}</span>
              <button className="theme-detail-close" onClick={() => setSelectedId(null)}>
                <IconSvg paths={['M18 6 6 18','M6 6l12 12']} size={16} />
              </button>
            </div>

            <p className="color-section-label">Brand Core</p>
            <div className="swatch-grid">
              {selectedTheme.brand.map(c => (
                <div key={c.name} className="swatch-card" onClick={() => copy(c.hex)} title="클릭하여 복사">
                  <div className="swatch-color" style={{ backgroundColor: c.hex }} />
                  <div className="swatch-info">
                    <div className="swatch-name">{c.name}</div>
                    <div className="swatch-hex">{c.hex}</div>
                    <div className="swatch-role">{c.role}</div>
                  </div>
                </div>
              ))}
            </div>

            <p className="color-section-label">Semantic Colors</p>
            <div className="swatch-grid">
              {selectedTheme.semantic.map(c => (
                <div key={c.name} className="swatch-card" onClick={() => copy(c.hex)} title="클릭하여 복사">
                  <div className="swatch-color" style={{ backgroundColor: c.hex }} />
                  <div className="swatch-info">
                    <div className="swatch-name">{c.name}</div>
                    <div className="swatch-hex">{c.hex}</div>
                    <div className="swatch-role">{c.desc}</div>
                  </div>
                </div>
              ))}
            </div>

            <p className="color-section-label">Neutrals (Gray Scale)</p>
            <div className="neutral-strip">
              {selectedTheme.neutrals.map(c => (
                <div key={c.name} className="neutral-swatch" onClick={() => copy(c.hex)} title={c.hex}>
                  <div className="neutral-color" style={{ backgroundColor: c.hex }} />
                  <div className="neutral-label">{c.name}</div>
                </div>
              ))}
            </div>
            <p className="text-xs mt-2" style={{color:'rgba(255,255,255,0.25)'}}>스와치를 클릭하면 HEX 값이 클립보드에 복사됩니다.</p>
          </div>
        )}
      </main>
    </div>
  );
}

  const gr = 'rgba(255,255,255,0.05)';
  // viewBox 0 0 400 200: x 15-385, y-bottom 185
  const sp = { viewBox: '0 0 400 200', width: '100%', style: { display: 'block' } };

  const arcPath = (cx, cy, R, r, s, e) => {
    const rad = d => (d - 90) * Math.PI / 180;
    const c = Math.cos, sn = Math.sin;
    const [a0, a1] = [rad(s), rad(e)];
    const lg = e - s > 180 ? 1 : 0;
    const f = n => n.toFixed(2);
    return `M${f(cx+R*c(a0))},${f(cy+R*sn(a0))} A${R},${R},0,${lg},1,${f(cx+R*c(a1))},${f(cy+R*sn(a1))} L${f(cx+r*c(a1))},${f(cy+r*sn(a1))} A${r},${r},0,${lg},0,${f(cx+r*c(a0))},${f(cy+r*sn(a0))} Z`;
  };

  if (chartId === 1) return ( // Bar Chart — 6 bars
    <svg {...sp}>
      {[55,100,145].map(y => <line key={y} x1="15" x2="385" y1={y} y2={y} stroke={gr} strokeWidth="1"/>)}
      <line x1="15" y1="185" x2="385" y2="185" stroke={ax} strokeWidth="1"/>
      {[118,80,155,60,108,85].map((h, i) => (
        <rect key={i} x={36+i*57} y={185-h} width="44" height={h} rx="3"
          fill={i===2 ? A : P} fillOpacity={i===2 ? 0.82 : 0.65}/>
      ))}
    </svg>
  );

  if (chartId === 2) return ( // Stacked Bar Chart — 5 bars × 3 segments
    <svg {...sp}>
      <line x1="15" y1="185" x2="385" y2="185" stroke={ax} strokeWidth="1"/>
      {[[50,72,32],[42,65,44],[58,68,35],[45,55,52],[52,64,30]].map((segs, i) => {
        let y = 185;
        return (
          <g key={i}>
            {[P,S,A].map((col, j) => {
              const h = segs[j]; y -= h;
              return <rect key={j} x={44+i*66} y={y} width="48" height={h} rx={j===2?3:0} fill={col} fillOpacity="0.72"/>;
            })}
          </g>
        );
      })}
    </svg>
  );

  if (chartId === 3) return ( // Line Chart — 2 series
    <svg {...sp}>
      {[55,100,145].map(y => <line key={y} x1="15" x2="385" y1={y} y2={y} stroke={gr} strokeWidth="1"/>)}
      <line x1="15" y1="185" x2="385" y2="185" stroke={ax} strokeWidth="1"/>
      <polyline points="25,148 80,108 135,122 192,62 248,82 305,42 375,65"
        fill="none" stroke={P} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {[[25,148],[80,108],[135,122],[192,62],[248,82],[305,42],[375,65]].map(([x,y],i)=>(
        <circle key={i} cx={x} cy={y} r="4" fill={P}/>
      ))}
      <polyline points="25,165 80,136 135,150 192,108 248,120 305,92 375,112"
        fill="none" stroke={A} strokeWidth="2" strokeDasharray="7,4"
        strokeLinejoin="round" strokeLinecap="round" strokeOpacity="0.6"/>
    </svg>
  );

  if (chartId === 4) return ( // Area Chart
    <svg {...sp}>
      {[60,110].map(y => <line key={y} x1="15" x2="385" y1={y} y2={y} stroke={gr} strokeWidth="1"/>)}
      <line x1="15" y1="185" x2="385" y2="185" stroke={ax} strokeWidth="1"/>
      <defs>
        <linearGradient id="cpag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={P} stopOpacity="0.42"/>
          <stop offset="100%" stopColor={P} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <polygon points="25,185 25,148 80,110 135,126 192,58 248,80 305,42 375,62 375,185" fill="url(#cpag)"/>
      <polyline points="25,148 80,110 135,126 192,58 248,80 305,42 375,62"
        fill="none" stroke={P} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {[[25,148],[80,110],[135,126],[192,58],[248,80],[305,42],[375,62]].map(([x,y],i)=>(
        <circle key={i} cx={x} cy={y} r="3.5" fill={P}/>
      ))}
    </svg>
  );

  if (chartId === 5) return ( // Donut Chart — centered left, legend right
    <svg {...sp}>
      <path d={arcPath(118,100,68,34,  0,130)} fill={P} fillOpacity="0.82"/>
      <path d={arcPath(118,100,68,34,130,220)} fill={S} fillOpacity="0.82"/>
      <path d={arcPath(118,100,68,34,220,295)} fill={A} fillOpacity="0.82"/>
      <path d={arcPath(118,100,68,34,295,360)} fill="rgba(255,255,255,0.18)"/>
      {[P,S,A,'rgba(255,255,255,0.3)'].map((col, i) => (
        <g key={i} transform={`translate(228,${48+i*28})`}>
          <rect width="12" height="12" rx="3" fill={col} fillOpacity="0.85"/>
          <rect x="20" y="1" width={[115,88,72,60][i]} height="10" rx="2" fill="rgba(255,255,255,0.06)"/>
        </g>
      ))}
    </svg>
  );

  if (chartId === 6) return ( // Treemap
    <svg {...sp}>
      <rect x="18" y="18" width="118" height="98" rx="3" fill={P} fillOpacity="0.62"/>
      <rect x="18" y="118" width="118" height="62" rx="3" fill={P} fillOpacity="0.28"/>
      <rect x="140" y="18" width="90" height="72" rx="3" fill={S} fillOpacity="0.62"/>
      <rect x="140" y="92" width="90" height="88" rx="3" fill={S} fillOpacity="0.28"/>
      <rect x="234" y="18" width="72" height="90" rx="3" fill={A} fillOpacity="0.62"/>
      <rect x="234" y="110" width="72" height="70" rx="3" fill={A} fillOpacity="0.28"/>
      <rect x="310" y="18" width="70" height="55" rx="3" fill="rgba(255,255,255,0.2)"/>
      <rect x="310" y="75" width="70" height="85" rx="3" fill="rgba(255,255,255,0.1)"/>
    </svg>
  );

  if (chartId === 7) return ( // Scatter Plot
    <svg {...sp}>
      {[55,100,145].map(y => <line key={y} x1="25" x2="385" y1={y} y2={y} stroke={gr} strokeWidth="1"/>)}
      <line x1="25" y1="20" x2="25" y2="188" stroke={ax} strokeWidth="1"/>
      <line x1="25" y1="188" x2="385" y2="188" stroke={ax} strokeWidth="1"/>
      <line x1="35" y1="178" x2="378" y2="30"
        stroke="rgba(255,255,255,0.1)" strokeWidth="1.5" strokeDasharray="6,4"/>
      {[
        [42,178,4,P],[68,158,5,P],[88,145,4,A],[108,162,5,P],[128,138,4,A],
        [148,125,5,P],[165,115,4,P],[188,128,4,A],[208,108,5,P],[228,98,4,P],
        [248,115,4,A],[268,88,5,P],[288,100,4,A],[308,78,5,P],[328,90,4,P],
        [348,68,5,A],[365,75,4,P],[378,55,4,A],[55,168,3.5,A],[135,148,4,P],
        [198,118,4,A],[285,95,3.5,P],[345,72,4,A],[175,132,4,P],[240,105,4,P],
      ].map(([x,y,r,col],i)=>(
        <circle key={i} cx={x} cy={y} r={r} fill={col} fillOpacity="0.72"/>
      ))}
    </svg>
  );

  if (chartId === 8) return ( // Histogram — 9 bins, bell-curve heights
    <svg {...sp}>
      {[65,115].map(y => <line key={y} x1="15" x2="385" y1={y} y2={y} stroke={gr} strokeWidth="1"/>)}
      <line x1="15" y1="185" x2="385" y2="185" stroke={ax} strokeWidth="1"/>
      {[14,35,70,108,122,102,68,38,16].map((h, i) => (
        <rect key={i} x={20+i*40} y={185-h} width="40" height={h}
          fill={P} fillOpacity={0.35+(h/122)*0.45}/>
      ))}
    </svg>
  );

  return null;
}
